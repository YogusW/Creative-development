<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar System — Field Chart</title>
<style>
  :root{
    --bg: #05070d;
    --panel: #0b1220;
    --panel-border: rgba(124,212,255,0.18);
    --ink: #eef2f7;
    --ink-dim: #8fa2b8;
    --cyan: #7cd4ff;
    --gold: #ffcf6b;
    --coral: #ff6b5e;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, "Courier New", monospace;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--mono);
    color: var(--ink);
  }
  #canvas-holder{ position:fixed; inset:0; }
  canvas{ display:block; width:100%; height:100%; cursor: grab; }
  canvas:active{ cursor: grabbing; }

  .hud{
    position: fixed;
    background: linear-gradient(180deg, rgba(11,18,32,0.92), rgba(11,18,32,0.82));
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(6px);
    border-radius: 3px;
    padding: 14px 16px;
    pointer-events: auto;
  }

  #title-panel{
    top: 18px; left: 18px;
    max-width: 320px;
  }
  #title-panel h1{
    font-family: var(--serif);
    font-size: 22px;
    letter-spacing: 0.5px;
    margin: 0 0 4px 0;
    color: var(--ink);
    font-style: italic;
  }
  #title-panel .sub{
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  #title-panel .rule{
    height:1px; background: var(--panel-border); margin: 10px 0;
  }
  #title-panel .hint{
    font-size: 11px; color: var(--ink-dim); line-height:1.6;
  }

  #control-panel{
    top: 18px; right: 18px;
    width: 220px;
  }
  #control-panel .row{
    display:flex; align-items:center; justify-content: space-between;
    margin-bottom: 10px;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  #control-panel .row:last-child{ margin-bottom: 0; }
  #control-panel input[type=range]{
    width: 110px; accent-color: var(--cyan);
  }
  #pause-btn{
    background: none; border: 1px solid var(--panel-border);
    color: var(--cyan); font-family: var(--mono); font-size: 11px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 6px 10px; border-radius: 2px; cursor: pointer;
  }
  #pause-btn:hover{ border-color: var(--cyan); }

  #planet-list{
    position: fixed; left: 18px; bottom: 18px;
    display:flex; flex-direction: column; gap: 6px;
  }
  .planet-tag{
    font-size: 11px; letter-spacing: 0.5px;
    padding: 5px 10px; border-radius: 2px;
    border: 1px solid var(--panel-border);
    background: rgba(11,18,32,0.75);
    color: var(--ink-dim);
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .planet-tag:hover{ color: var(--ink); border-color: var(--cyan); }
  .planet-tag.active{ color: var(--bg); background: var(--cyan); border-color: var(--cyan); }

  #dossier{
    position: fixed; right: 18px; bottom: 18px;
    width: 260px;
    display: none;
  }
  #dossier.show{ display:block; }
  #dossier h2{
    font-family: var(--serif); font-style: italic;
    font-size: 20px; margin: 0 0 2px 0;
  }
  #dossier .kind{
    font-size: 10px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  #dossier .field{
    display:flex; justify-content: space-between;
    font-size: 11px; padding: 4px 0;
    border-top: 1px dashed var(--panel-border);
  }
  #dossier .field .k{ color: var(--ink-dim); }
  #dossier .field .v{ color: var(--cyan); }
  #dossier .note{
    margin-top: 10px; font-size: 11px; line-height: 1.5; color: var(--ink-dim);
    font-family: var(--serif); font-style: italic;
  }
  #dossier .close{
    position: absolute; top: 10px; right: 12px;
    color: var(--ink-dim); cursor: pointer; font-size: 14px;
  }
  #dossier .close:hover{ color: var(--coral); }

  ::selection{ background: var(--cyan); color: var(--bg); }
</style>
</head>
<body>

<div id="canvas-holder"></div>

<div class="hud" id="control-panel">
  <div class="row">
    <span>Time scale</span>
    <input type="range" id="speed" min="0" max="5" step="0.01" value="1">
  </div>
  <div class="row">
    <span id="speed-label">1.00×</span>
    <button id="pause-btn">Pause</button>
  </div>
</div>

<div id="planet-list"></div>

<div class="hud" id="dossier">
  <span class="close" id="dossier-close">&times;</span>
  <h2 id="d-name">—</h2>
  <div class="kind" id="d-kind">—</div>
  <div class="field"><span class="k">Diameter</span><span class="v" id="d-diameter">—</span></div>
  <div class="field"><span class="k">Distance from Sun</span><span class="v" id="d-distance">—</span></div>
  <div class="field"><span class="k">Length of year</span><span class="v" id="d-year">—</span></div>
  <div class="field"><span class="k">Length of day</span><span class="v" id="d-day">—</span></div>
  <div class="field"><span class="k">Known moons</span><span class="v" id="d-moons">—</span></div>
  <div class="note" id="d-note">—</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){

  // ---------- data ----------
  const PLANETS = [
    { name:"Mercury", color:0x9c9088, size:1.0,  dist:26, speed:4.15, spin:0.02,
      diameter:"4,879 km", distance:"57.9 million km", year:"88 Earth days", day:"59 Earth days", moons:"0",
      note:"The swiftest world, scorched by day and frozen by night, with almost no atmosphere to hold the warmth in between." },
    { name:"Venus", color:0xd8b98a, size:1.9,  dist:36, speed:1.62, spin:0.015,
      diameter:"12,104 km", distance:"108.2 million km", year:"225 Earth days", day:"243 Earth days", moons:"0",
      note:"Wrapped in a crushing, acid-clouded atmosphere hot enough to melt lead — and it spins backwards, slower than it orbits." },
    { name:"Earth", color:0x3b82c4, size:2.0,  dist:48, speed:1.0,  spin:0.35,
      diameter:"12,742 km", distance:"149.6 million km", year:"365.25 days", day:"24 hours", moons:"1",
      note:"The one world charted here known to hold a garden, and a single pale moon to keep its tides." },
    { name:"Mars", color:0xb5502e, size:1.4,  dist:60, speed:0.53, spin:0.34,
      diameter:"6,779 km", distance:"227.9 million km", year:"687 Earth days", day:"24.6 hours", moons:"2",
      note:"A rust-red desert world with the tallest volcano and deepest canyon of any planet in the chart." },
    { name:"Jupiter", color:0xc9a67a, size:5.2,  dist:82, speed:0.084, spin:0.9, hasRing:false,
      diameter:"139,820 km", distance:"778.5 million km", year:"11.9 Earth years", day:"9.9 hours", moons:"95",
      note:"A gas giant so vast that its Great Red Spot, a storm centuries old, could swallow the Earth entire." },
    { name:"Saturn", color:0xe3c98f, size:4.4,  dist:108, speed:0.034, spin:0.85, hasRing:true,
      diameter:"116,460 km", distance:"1.43 billion km", year:"29.5 Earth years", day:"10.7 hours", moons:"146",
      note:"Girdled in bright rings of ice and rock, thin enough to vanish edge-on yet spanning a quarter million kilometres." },
    { name:"Uranus", color:0x9fd8e0, size:3.2,  dist:130, speed:0.012, spin:0.6, hasRing:true, ringThin:true,
      diameter:"50,724 km", distance:"2.87 billion km", year:"84 Earth years", day:"17.2 hours", moons:"27",
      note:"Tipped almost entirely on its side, so each pole faces the Sun for a slow, forty-year season of light." },
    { name:"Neptune", color:0x3f5fd8, size:3.1,  dist:150, speed:0.006, spin:0.58,
      diameter:"49,244 km", distance:"4.5 billion km", year:"165 Earth years", day:"16.1 hours", moons:"14",
      note:"The farthest charted world, lashed by the fastest winds in the solar system, over 2,000 km/h." },
  ];

  // ---------- renderer / scene / camera ----------
  const holder = document.getElementById('canvas-holder');
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 5000);
  let camDist = 220, camTheta = 0.9, camPhi = 1.1;
  const camTarget = new THREE.Vector3(0,0,0);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  holder.appendChild(renderer.domElement);

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- starfield ----------
  function makeStars(count, spread){
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count*3);
    for(let i=0;i<count;i++){
      const r = spread * (0.4 + Math.random()*0.6);
      const theta = Math.random()*Math.PI*2;
      const phi = Math.acos(2*Math.random()-1);
      pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
      pos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
      pos[i*3+2] = r*Math.cos(phi);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const mat = new THREE.PointsMaterial({ color:0xffffff, size:1.1, sizeAttenuation:true });
    return new THREE.Points(geo, mat);
  }
  scene.add(makeStars(3500, 1800));
  scene.add(makeStars(1500, 900));

  // ---------- lighting ----------
  scene.add(new THREE.AmbientLight(0x223344, 0.6));
  const sunLight = new THREE.PointLight(0xfff2d0, 2.4, 0, 0);
  scene.add(sunLight);

  // ---------- sun ----------
  const sunGeo = new THREE.SphereGeometry(9, 48, 48);
  const sunMat = new THREE.MeshBasicMaterial({ color:0xffdf8c });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sun);

  const glowGeo = new THREE.SphereGeometry(12, 48, 48);
  const glowMat = new THREE.MeshBasicMaterial({ color:0xffcf6b, transparent:true, opacity:0.18 });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // ---------- orbit rings + planets ----------
  const planetMeshes = [];
  const listEl = document.getElementById('planet-list');

  PLANETS.forEach((p, idx)=>{
    // orbit ring
    const ringGeo = new THREE.RingGeometry(p.dist-0.08, p.dist+0.08, 128);
    const ringMat = new THREE.MeshBasicMaterial({ color:0x7cd4ff, transparent:true, opacity:0.12, side:THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI/2;
    scene.add(ring);

    // planet group (for orbit) + mesh
    const orbitGroup = new THREE.Group();
    scene.add(orbitGroup);

    const geo = new THREE.SphereGeometry(p.size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({ color:p.color, roughness:0.8, metalness:0.05 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.x = p.dist;
    mesh.userData = { planet:p, index:idx };
    orbitGroup.add(mesh);

    if(p.hasRing){
      const inner = p.size * (p.ringThin ? 1.5 : 1.4);
      const outer = p.size * (p.ringThin ? 1.9 : 2.3);
      const rGeo = new THREE.RingGeometry(inner, outer, 64);
      const rMat = new THREE.MeshBasicMaterial({ color:p.color, transparent:true, opacity:0.5, side:THREE.DoubleSide });
      const rMesh = new THREE.Mesh(rGeo, rMat);
      rMesh.rotation.x = Math.PI/2.4;
      mesh.add(rMesh);
    }

    orbitGroup.userData = { angle: Math.random()*Math.PI*2, speed:p.speed, mesh, spin:p.spin };
    planetMeshes.push(orbitGroup);

    // sidebar tag
    const tag = document.createElement('div');
    tag.className = 'planet-tag';
    tag.textContent = p.name;
    tag.addEventListener('click', ()=> focusPlanet(idx));
    listEl.appendChild(tag);
  });

  // ---------- interaction: drag to orbit camera ----------
  let dragging=false, lastX=0, lastY=0;
  const dom = renderer.domElement;
  dom.addEventListener('pointerdown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('pointerup', ()=> dragging=false);
  window.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    lastX=e.clientX; lastY=e.clientY;
    camTheta -= dx*0.005;
    camPhi   -= dy*0.005;
    camPhi = Math.max(0.15, Math.min(Math.PI-0.15, camPhi));
  });
  dom.addEventListener('wheel', e=>{
    e.preventDefault();
    camDist *= (1 + e.deltaY*0.001);
    camDist = Math.max(14, Math.min(900, camDist));
  }, { passive:false });

  // click to select a planet directly in the scene
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  dom.addEventListener('click', e=>{
    // ignore clicks that were actually drags
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(planetMeshes.map(g=>g.userData.mesh));
    if(hits.length){
      focusPlanet(hits[0].object.userData.index);
    }
  });

  // ---------- dossier / focus ----------
  let focusedIndex = -1;
  const dossier = document.getElementById('dossier');
  const tags = ()=> document.querySelectorAll('.planet-tag');

  function focusPlanet(idx){
    focusedIndex = idx;
    const p = PLANETS[idx];
    document.getElementById('d-name').textContent = p.name;
    document.getElementById('d-kind').textContent = (idx<=3? "Terrestrial world" : "Giant world") + " · Position " + (idx+1) + " from the Sun";
    document.getElementById('d-diameter').textContent = p.diameter;
    document.getElementById('d-distance').textContent = p.distance;
    document.getElementById('d-year').textContent = p.year;
    document.getElementById('d-day').textContent = p.day;
    document.getElementById('d-moons').textContent = p.moons;
    document.getElementById('d-note').textContent = p.note;
    dossier.classList.add('show');
    tags().forEach((t,i)=> t.classList.toggle('active', i===idx));
  }
  document.getElementById('dossier-close').addEventListener('click', ()=>{
    dossier.classList.remove('show');
    focusedIndex = -1;
    tags().forEach(t=>t.classList.remove('active'));
  });

  // ---------- speed / pause controls ----------
  let timeScale = 1, paused = false;
  const speedInput = document.getElementById('speed');
  const speedLabel = document.getElementById('speed-label');
  speedInput.addEventListener('input', ()=>{
    timeScale = parseFloat(speedInput.value);
    speedLabel.textContent = timeScale.toFixed(2) + '×';
  });
  const pauseBtn = document.getElementById('pause-btn');
  pauseBtn.addEventListener('click', ()=>{
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  });

  // ---------- animation loop ----------
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if(!paused){
      planetMeshes.forEach(g=>{
        g.userData.angle += g.userData.speed * dt * timeScale * 0.4;
        g.rotation.y = g.userData.angle;
        g.userData.mesh.rotation.y += g.userData.spin * dt * timeScale;
      });
      sun.rotation.y += 0.02*dt;
    }

    // camera: orbit around target, or follow focused planet
    if(focusedIndex >= 0){
      const g = planetMeshes[focusedIndex];
      const mesh = g.userData.mesh;
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);
      camTarget.lerp(worldPos, 0.08);
      const desiredDist = Math.max(PLANETS[focusedIndex].size*7, 16);
      camDist += (desiredDist - camDist)*0.02;
    } else {
      camTarget.lerp(new THREE.Vector3(0,0,0), 0.05);
    }

    const x = camTarget.x + camDist*Math.sin(camPhi)*Math.sin(camTheta);
    const y = camTarget.y + camDist*Math.cos(camPhi);
    const z = camTarget.z + camDist*Math.sin(camPhi)*Math.cos(camTheta);
    camera.position.set(x,y,z);
    camera.lookAt(camTarget);

    renderer.render(scene, camera);
  }
  animate();

})();
</script>
</body>
</html>
